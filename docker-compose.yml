services:
  # === INFRAESTRUTURA ===
  postgres:
    image: postgres:16-alpine
    container_name: stocksnap-db
    environment:
      POSTGRES_DB: stocksnap
      POSTGRES_USER: stocksnap
      POSTGRES_PASSWORD: stocksnap123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksnap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stocksnap-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === APLICAÇÃO ===
  api:
    build: ./backend
    container_name: stocksnap-api
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: stocksnap-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - api

volumes:
  pgdata:
