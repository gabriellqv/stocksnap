services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: stocksnap-db
    environment:
      POSTGRES_DB: stocksnap
      POSTGRES_USER: stocksnap
      POSTGRES_PASSWORD: stocksnap123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksnap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: stocksnap-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
